name: CI

on:
  push:
    branches: ["main", "feat/paystack-settlement-sync"]
  pull_request:
    branches: ["main", "feat/paystack-settlement-sync"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build
